<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="16" height="16" fill="#09090b"/>

  <!-- Face outline (pixel border) -->
  <rect x="4" y="1" width="8" height="1" fill="#3b82f6"/>
  <rect x="3" y="2" width="1" height="1" fill="#3b82f6"/>
  <rect x="12" y="2" width="1" height="1" fill="#3b82f6"/>
  <rect x="2" y="3" width="1" height="10" fill="#3b82f6"/>
  <rect x="13" y="3" width="1" height="10" fill="#3b82f6"/>
  <rect x="3" y="13" width="1" height="1" fill="#3b82f6"/>
  <rect x="12" y="13" width="1" height="1" fill="#3b82f6"/>
  <rect x="4" y="14" width="8" height="1" fill="#3b82f6"/>

  <!-- Left eye -->
  <rect x="4" y="5" width="3" height="3" fill="#3b82f6"/>
  <rect x="5" y="6" width="1" height="1" fill="#0a0a0a"/>

  <!-- Right eye -->
  <rect x="9" y="5" width="3" height="3" fill="#3b82f6"/>
  <rect x="10" y="6" width="1" height="1" fill="#0a0a0a"/>

  <!-- Mouth (status bar) -->
  <rect x="5" y="10" width="6" height="1" fill="#27272a"/>
  <rect x="5" y="10" width="4" height="1" fill="#3b82f6" opacity="0.8"/>

  <!-- Scan line -->
  <rect x="3" y="12" width="10" height="1" fill="#3b82f6" opacity="0.2"/>
</svg>
